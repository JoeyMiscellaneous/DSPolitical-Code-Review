version: '3.8'

services:
  dev-php:
    build:
      context: .
      dockerfile: ./docker/development/dev-php/Dockerfile
    volumes:
      - "./backend:/var/www"
  
  symfony:
    build:
      context: .
      dockerfile: ./docker/development/dev-php/Dockerfile
    volumes:
      - "./backend:/var/www"
    ports:
      - "8000:8000"
    command: symfony server:start --allow-all-ip

  dev-react:
    image: node:23-alpine
    volumes:
      - "./frontend:/var/www"
    working_dir: "/var/www"

  react:
    image: node:23-alpine
    volumes:
      - "./frontend:/var/www"
    working_dir: "/var/www"
    ports:
      - "5173:5173"
    command: npm run dev --host
